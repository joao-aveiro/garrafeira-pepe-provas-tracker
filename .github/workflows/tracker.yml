name: Provas tracker

on:
  schedule:
    # Offset 2 min from the hour boundary to dodge GitHub's peak-load
    # window where scheduled jobs are commonly delayed or dropped.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: provas-tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for new tastings
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_USER_AGENT: "GarrafeiraPepeMonitor/1.0 (+https://github.com/${{ github.repository }})"
        run: python main.py

      - name: Persist state
        run: |
          if git diff --quiet state.json; then
            echo "No state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore(state): update seen_ids ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
